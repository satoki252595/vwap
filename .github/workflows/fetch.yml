name: fetch-vwap

on:
  # JST 9:00-15:30 の立会時間 = UTC 0:00-6:30。終値確定のため 6:45 まで。
  # GitHub の cron は UTC・最小5分間隔(遅延・スキップあり=冪等上書きで吸収)。
  schedule:
    - cron: "0,15,30,45 0-6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}

# 同時実行を抑止(取得→commit の競合回避)
concurrency:
  group: fetch-vwap
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --no-cache-dir yfinance

      - name: Fetch & compute
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/fetch_vwap.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
