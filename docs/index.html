<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VWAP / 価格別出来高</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header>
    <div class="brand">VWAP<span>/</span>価格別出来高</div>

    <div class="search" id="search">
      <svg viewBox="0 0 24 24" class="search-ic" aria-hidden="true"><path d="M21 21l-4.3-4.3M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"/></svg>
      <input id="q" type="text" placeholder="銘柄コード（4桁）または銘柄名で検索" autocomplete="off" spellcheck="false" />
      <ul id="suggest" class="suggest" hidden></ul>
    </div>

    <div class="opts">
      <div class="seg" id="period">
        <button class="seg-btn on" data-v="day">当日</button>
        <button class="seg-btn" data-v="composite">複数日合成</button>
      </div>
      <select id="date" class="date"></select>
      <div class="toggles">
        <button class="toggle on" data-key="vwap"><i class="dot vwap"></i>VWAP</button>
        <button class="toggle on" data-key="profile"><i class="dot poc"></i>価格別出来高</button>
        <button class="toggle on" data-key="volume"><i class="dot vol"></i>出来高</button>
      </div>
    </div>
  </header>

  <section class="bar" id="meta"></section>

  <main id="chartWrap">
    <div id="chart"></div>
    <canvas id="overlay"></canvas>
    <div id="empty" class="empty" hidden></div>
  </main>

  <footer id="updated"></footer>

  <script src="./app.js"></script>
</body>
</html>
